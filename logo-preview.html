<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  body{margin:0;font-family:sans-serif;}
  .row{display:flex;align-items:center;gap:40px;padding:30px 40px;}
  .white{background:#ffffff;} .grey{background:#f1f2f4;} .dark{background:#0e1118;}
  img.big{height:120px;} img.mid{height:56px;} img.sm{height:34px;}
  .lbl{font-size:12px;color:#888;width:90px;}
</style></head><body>
  <div class="row white"><span class="lbl">white</span><img class="big" src="goai-logo.svg"><img class="mid" src="goai-logo.svg"><img class="sm" src="goai-logo.svg"></div>
  <div class="row grey"><span class="lbl">light grey</span><img class="big" src="goai-logo.svg"><img class="mid" src="goai-logo.svg"><img class="sm" src="goai-logo.svg"></div>
  <div class="row white"><span class="lbl">header</span>
    <span style="display:inline-flex;align-items:center;gap:10px;"><img class="mid" src="goai-logo.svg"></span>
  </div>
</body></html>
